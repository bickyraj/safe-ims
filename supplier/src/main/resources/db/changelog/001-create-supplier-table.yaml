databaseChangeLog:
    - changeSet:
            id: 001-create-supplier-table
            author: bicky
            changes:
              - createTable:
                  tableName: suppliers
                  columns:
                    - column:
                        name: id
                        type: bigint
                        autoIncrement: true
                        constraints:
                          primaryKey: true
                          nullable: false
                    - column:
                        name: name
                        type: varchar(255)
                        constraints:
                          nullable: false
                    - column:
                        name: email
                        type: varchar(255)
                        constraints:
                          nullable: false
                          unique: true
                    - column:
                        name: created_at
                        type: timestamp
                        defaultValueComputed: CURRENT_TIMESTAMP
                        constraints:
                          nullable: false
                    - column:
                        name: address
                        type: varchar(255)
                        constraints:
                          nullable: true
                    - column:
                        name: phone
                        type: varchar(255)
                        constraints:
                          nullable: true
                    - column:
                        name: updated_at
                        type: timestamp
                        defaultValueComputed: CURRENT_TIMESTAMP
                        constraints:
                          nullable: false