spring:
  application:
    name: ims-app
  datasource:
    url: jdbc:postgresql://localhost:5432/ims
    username: ims
    password: ims
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  liquibase:
    change-log: classpath:db/changelog/changelog-master.yaml
  ai:
    mcp:
      server:
        enabled: true
        name: ims-server
        version: 1.0.0
server:
  port: 8087
